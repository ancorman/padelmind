<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PadelMind — Court Calibration</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f13; color: #e2e8f0; min-height: 100vh; }

  header { background: #1a1a2e; border-bottom: 1px solid #2d2d4e; padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 700; color: #7c3aed; letter-spacing: 0.5px; }
  header .court-badge { background: #2d2d4e; border: 1px solid #4c4c7f; border-radius: 6px; padding: 4px 10px; font-size: 13px; color: #a78bfa; }
  header .step-badge { margin-left: auto; font-size: 12px; color: #64748b; }

  .layout { display: flex; height: calc(100vh - 52px); }

  /* ── Sidebar ── */
  .sidebar { width: 280px; flex-shrink: 0; background: #16162a; border-right: 1px solid #2d2d4e; display: flex; flex-direction: column; overflow-y: auto; }

  .diagram-wrap { padding: 16px; border-bottom: 1px solid #2d2d4e; }
  .diagram-wrap h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; }
  .diagram-wrap svg { width: 100%; display: block; }

  .points-list { padding: 12px 16px; border-bottom: 1px solid #2d2d4e; flex: 1; }
  .points-list h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 8px; }
  .point-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #1e1e36; cursor: pointer; }
  .point-item:last-child { border-bottom: none; }
  .point-item.active { background: #1e1e40; margin: 0 -16px; padding: 5px 16px; }
  .point-item.done .dot { background: #22c55e; }
  .point-item.active .dot { background: #f59e0b; animation: pulse 1s infinite; }
  .dot { width: 20px; height: 20px; border-radius: 50%; background: #2d2d4e; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .point-label { font-size: 12px; color: #94a3b8; flex: 1; }
  .point-item.done .point-label { color: #4ade80; }
  .point-item.active .point-label { color: #fcd34d; }
  .point-coords { font-size: 10px; color: #475569; font-family: monospace; }
  .undo-btn { background: none; border: none; cursor: pointer; color: #ef4444; font-size: 11px; opacity: 0; padding: 0 4px; }
  .point-item.done:hover .undo-btn { opacity: 1; }

  .controls { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .controls label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
  .controls input { width: 100%; background: #0f0f1a; border: 1px solid #2d2d4e; border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 13px; }
  .controls input:focus { outline: none; border-color: #7c3aed; }
  .btn { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
  .btn-save { background: #7c3aed; color: white; }
  .btn-save:hover:not(:disabled) { background: #6d28d9; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-reset { background: #1e1e36; color: #94a3b8; border: 1px solid #2d2d4e; }
  .btn-reset:hover { background: #2d2d4e; }
  .status { padding: 10px 16px; font-size: 12px; min-height: 36px; border-top: 1px solid #2d2d4e; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
  .status.info { color: #94a3b8; }

  /* ── Canvas area ── */
  .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a12; position: relative; overflow: hidden; }

  .upload-zone { border: 2px dashed #2d2d4e; border-radius: 16px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .upload-zone:hover { border-color: #7c3aed; background: #1a1040; }
  .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .upload-zone p { color: #64748b; font-size: 14px; }
  .upload-zone strong { color: #a78bfa; }

  #canvas-wrap { position: relative; display: none; max-width: 100%; max-height: 100%; }
  #main-canvas { display: block; max-width: 100%; max-height: calc(100vh - 52px); cursor: crosshair; }
  #hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: #fcd34d; padding: 6px 14px; border-radius: 20px; font-size: 12px; pointer-events: none; white-space: nowrap; }

  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

  /* ── Drag-over ── */
  body.drag-over .upload-zone { border-color: #7c3aed; background: #1a1040; }
</style>
</head>
<body>

<header>
  <h1>PadelMind</h1>
  <span class="court-badge" id="court-name">Loading...</span>
  <span class="step-badge" id="step-badge">Upload a camera still to begin</span>
</header>

<div class="layout">
  <aside class="sidebar">

    <div class="diagram-wrap">
      <h3>Court reference (top view)</h3>
      <svg viewBox="-5 -5 110 210" xmlns="http://www.w3.org/2000/svg">
        <!-- Court outline -->
        <rect x="0" y="0" width="100" height="200" fill="none" stroke="#3d3d6e" stroke-width="1.5"/>
        <!-- Net -->
        <line x1="0" y1="100" x2="100" y2="100" stroke="#7c3aed" stroke-width="1.5"/>
        <!-- Near service line -->
        <line x1="0" y1="170" x2="100" y2="170" stroke="#3d3d6e" stroke-width="1"/>
        <!-- Far service line -->
        <line x1="0" y1="30" x2="100" y2="30" stroke="#3d3d6e" stroke-width="1"/>
        <!-- Center line near half -->
        <line x1="50" y1="170" x2="50" y2="100" stroke="#3d3d6e" stroke-width="1"/>
        <!-- Center line far half -->
        <line x1="50" y1="30" x2="50" y2="100" stroke="#3d3d6e" stroke-width="1"/>
        <!-- Points -->
        <circle cx="0" cy="200" r="5" fill="#ef4444"/><text x="5" y="204" fill="#fff" font-size="8">1</text>
        <circle cx="100" cy="200" r="5" fill="#ef4444"/><text x="104" y="204" fill="#fff" font-size="8">2</text>
        <circle cx="0" cy="170" r="5" fill="#f97316"/><text x="5" y="174" fill="#fff" font-size="8">3</text>
        <circle cx="100" cy="170" r="5" fill="#f97316"/><text x="104" y="174" fill="#fff" font-size="8">4</text>
        <circle cx="50" cy="170" r="5" fill="#eab308"/><text x="54" y="174" fill="#fff" font-size="8">5</text>
        <circle cx="0" cy="100" r="5" fill="#22c55e"/><text x="5" y="104" fill="#fff" font-size="8">6</text>
        <circle cx="100" cy="100" r="5" fill="#22c55e"/><text x="104" y="104" fill="#fff" font-size="8">7</text>
        <circle cx="0" cy="30" r="5" fill="#06b6d4"/><text x="5" y="34" fill="#fff" font-size="8">8</text>
        <circle cx="100" cy="30" r="5" fill="#06b6d4"/><text x="104" y="34" fill="#fff" font-size="8">9</text>
        <circle cx="50" cy="30" r="5" fill="#6366f1"/><text x="54" y="34" fill="#fff" font-size="8">10</text>
        <circle cx="0" cy="0" r="5" fill="#a855f7"/><text x="5" y="4" fill="#fff" font-size="8">11</text>
        <circle cx="100" cy="0" r="5" fill="#a855f7"/><text x="104" y="4" fill="#fff" font-size="8">12</text>
        <!-- Labels -->
        <text x="50" y="210" text-anchor="middle" fill="#3d3d6e" font-size="6">↑ Camera side (near)</text>
        <text x="50" y="-2" text-anchor="middle" fill="#3d3d6e" font-size="6">Far baseline</text>
        <text x="50" y="96" text-anchor="middle" fill="#7c3aed" font-size="6">NET</text>
      </svg>
    </div>

    <div class="points-list">
      <h3>Keypoints — click in order</h3>
      <ol id="points-ol" style="list-style:none"></ol>
    </div>

    <div class="controls">
      <div>
        <label>Admin secret</label>
        <input type="password" id="secret-input" placeholder="padelmind-pi-secret-****">
      </div>
      <button class="btn btn-save" id="save-btn" disabled>Save keypoints to DB</button>
      <button class="btn btn-reset" id="reset-btn">Reset all points</button>
    </div>
    <div class="status info" id="status-msg">Waiting for image upload.</div>
  </aside>

  <main class="canvas-area" id="canvas-area">
    <div class="upload-zone" id="upload-zone">
      <div class="icon">📷</div>
      <p><strong>Click or drag</strong> to upload a camera still</p>
      <p style="margin-top:8px;font-size:12px">JPEG / PNG / screenshot from iPad recording</p>
      <input type="file" id="file-input" accept="image/*" style="display:none">
    </div>
    <div id="canvas-wrap">
      <canvas id="main-canvas"></canvas>
      <div id="hint">Click point 1 of 12</div>
    </div>
  </main>
</div>

<script>
const WORKER = 'https://padelmind-api.manoj-5ce.workers.dev';

const POINTS = [
  { n: 1,  label: 'Near-left corner',        color: '#ef4444' },
  { n: 2,  label: 'Near-right corner',       color: '#ef4444' },
  { n: 3,  label: 'Near service line — left', color: '#f97316' },
  { n: 4,  label: 'Near service line — right',color: '#f97316' },
  { n: 5,  label: 'Center T (near)',          color: '#eab308' },
  { n: 6,  label: 'Net — left wall',          color: '#22c55e' },
  { n: 7,  label: 'Net — right wall',         color: '#22c55e' },
  { n: 8,  label: 'Far service line — left',  color: '#06b6d4' },
  { n: 9,  label: 'Far service line — right', color: '#06b6d4' },
  { n: 10, label: 'Center T (far)',            color: '#6366f1' },
  { n: 11, label: 'Far-left corner',           color: '#a855f7' },
  { n: 12, label: 'Far-right corner',          color: '#a855f7' },
];

// ── State ──
const params = new URLSearchParams(location.search);
const courtId   = params.get('court_id') || '';
const courtName = params.get('name')     || 'Unknown Court';

document.getElementById('court-name').textContent = courtName || courtId.slice(0,8) + '...';
document.title = `PadelMind Calibration — ${courtName}`;

let img = null;
let recorded = Array(12).fill(null); // {x, y} in image pixels
let current = 0;

// ── Build points list ──
const ol = document.getElementById('points-ol');
POINTS.forEach((p, i) => {
  const li = document.createElement('li');
  li.className = 'point-item' + (i === 0 ? ' active' : '');
  li.id = `pt-${i}`;
  li.innerHTML = `
    <div class="dot" style="background:${p.color}">${p.n}</div>
    <span class="point-label">${p.label}</span>
    <span class="point-coords" id="coords-${i}"></span>
    <button class="undo-btn" title="Redo this point" onclick="undoPoint(${i})">✕</button>
  `;
  ol.appendChild(li);
});

function undoPoint(i) {
  recorded[i] = null;
  current = i;
  refreshList();
  redraw();
  setStatus(`Point ${i+1} cleared — click it again on the image.`, 'info');
}

function refreshList() {
  POINTS.forEach((_, i) => {
    const li = document.getElementById(`pt-${i}`);
    const coords = document.getElementById(`coords-${i}`);
    li.className = 'point-item' + (recorded[i] ? ' done' : '') + (i === current && !recorded[i] ? ' active' : '');
    coords.textContent = recorded[i] ? `${recorded[i].x}, ${recorded[i].y}` : '';
  });

  const done = recorded.filter(Boolean).length;
  document.getElementById('step-badge').textContent =
    done === 12 ? '✓ All 12 points captured' : `Point ${current + 1} of 12`;
  document.getElementById('hint').textContent =
    done === 12 ? 'All done — hit Save' : `Click point ${current + 1}: ${POINTS[current].label}`;
  document.getElementById('save-btn').disabled = done < 12;
}

// ── Upload ──
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('file-input');
const canvas     = document.getElementById('main-canvas');
const ctx        = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');

uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadImage(e.target.files[0]));

document.body.addEventListener('dragover', e => { e.preventDefault(); document.body.classList.add('drag-over'); });
document.body.addEventListener('dragleave', () => document.body.classList.remove('drag-over'));
document.body.addEventListener('drop', e => {
  e.preventDefault();
  document.body.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});

function loadImage(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const image = new Image();
    image.onload = () => {
      img = image;
      canvas.width  = img.naturalWidth;
      canvas.height = img.naturalHeight;
      uploadZone.style.display = 'none';
      canvasWrap.style.display = 'block';
      recorded = Array(12).fill(null);
      current = 0;
      refreshList();
      redraw();
      setStatus(`Image loaded (${img.naturalWidth}×${img.naturalHeight}). Click point 1.`, 'info');
    };
    image.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Canvas click ──
canvas.addEventListener('click', e => {
  if (!img) return;
  if (current >= 12) return;

  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = Math.round((e.clientX - rect.left)  * scaleX);
  const y = Math.round((e.clientY - rect.top)   * scaleY);

  recorded[current] = { x, y };

  // advance to next un-recorded
  let next = current + 1;
  while (next < 12 && recorded[next]) next++;
  current = next;

  refreshList();
  redraw();

  if (current >= 12) {
    setStatus('All 12 points captured. Enter admin secret and click Save.', 'ok');
  } else {
    setStatus(`Point ${current} saved. Click point ${current + 1}.`, 'info');
  }
});

// ── Draw ──
function redraw() {
  if (!img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  recorded.forEach((pt, i) => {
    if (!pt) return;
    const p = POINTS[i];
    const r = Math.max(8, canvas.width * 0.008);
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(r * 1.2)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(p.n), pt.x, pt.y);
  });

  // highlight current target
  if (current < 12) {
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(0, 0, canvas.width, canvas.height);
    ctx.setLineDash([]);
  }
}

// ── Reset ──
document.getElementById('reset-btn').addEventListener('click', () => {
  recorded = Array(12).fill(null);
  current = 0;
  refreshList();
  redraw();
  setStatus('Reset. Click point 1 on the image.', 'info');
});

// ── Save ──
document.getElementById('save-btn').addEventListener('click', async () => {
  const secret = document.getElementById('secret-input').value.trim();
  if (!secret) { setStatus('Enter the admin secret first.', 'err'); return; }
  if (!courtId) { setStatus('No court_id in URL — add ?court_id=<uuid> to the URL.', 'err'); return; }
  if (recorded.some(p => !p)) { setStatus('Not all 12 points captured.', 'err'); return; }

  const payload = {
    secret,
    keypoints: {
      image_width:  canvas.width,
      image_height: canvas.height,
      points: POINTS.map((p, i) => ({
        n:     p.n,
        label: p.label,
        x:     recorded[i].x,
        y:     recorded[i].y,
      })),
    },
  };

  document.getElementById('save-btn').disabled = true;
  setStatus('Saving...', 'info');

  try {
    const res = await fetch(`${WORKER}/api/courts/${courtId}/keypoints`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (res.ok) {
      setStatus(`✓ Saved! Court ID: ${data.court_id}`, 'ok');
    } else {
      setStatus(`Error: ${data.error || res.status}`, 'err');
      document.getElementById('save-btn').disabled = false;
    }
  } catch (e) {
    setStatus(`Network error: ${e.message}`, 'err');
    document.getElementById('save-btn').disabled = false;
  }
});

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = `status ${type}`;
}

refreshList();
</script>
</body>
</html>
